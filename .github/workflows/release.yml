name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    name: CI
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # Go version is sourced from go.mod — the single source of truth.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Project-specific clean check
        if: runner.os == 'Linux'
        run: |
          if [ -f scripts/check-clean.sh ]; then
            if ! command -v rg >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y ripgrep
            fi
            bash scripts/check-clean.sh
          else
            echo "No scripts/check-clean.sh; skipping project-specific clean check."
          fi

      - name: Test
        run: go test ./...

      - name: Ensure race detector toolchain
        if: runner.os == 'Linux'
        run: |
          if ! command -v gcc >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y build-essential
          fi

      - name: Race test
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Extract release notes
        run: |
          # Slice the '## [VERSION]' section out of CHANGELOG.md for this tag.
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$ { /^## \[/d }' > release-notes.md
          # Defensive fallback: if the slice is empty, ship the whole changelog.
          [ -s release-notes.md ] || cp CHANGELOG.md release-notes.md

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --release-notes=release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - name: Verify version consistency
        run: |
          # Guard: the git tag must match package.json version, else the npm
          # release would diverge from the GitHub release.
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match package.json version (${PKG_VERSION})"
            exit 1
          fi

      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" --dir dist --pattern "*.tar.gz" --pattern "*.zip"
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -print

      - name: Prepare npm platform packages
        run: node scripts/prepare-npm-platform-packages.js dist npm-platform

      - name: Publish to npm
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          ROOT_PKG=$(node -p "require('./package.json').name")

          for dir in npm-platform/*; do
            [ -d "$dir" ] || continue
            PKG=$(node -p "require('./${dir}/package.json').name")
            if npm view "${PKG}@${VERSION}" version 2>/dev/null | grep -qx "${VERSION}"; then
              echo "npm package ${PKG}@${VERSION} already published; skipping"
              continue
            fi
            npm publish "./$dir" --access public --provenance
          done

          if npm view "${ROOT_PKG}@${VERSION}" version 2>/dev/null | grep -qx "${VERSION}"; then
            echo "npm package ${ROOT_PKG}@${VERSION} already published; skipping"
            exit 0
          fi
          # Keep platform pins in lockstep with the package version (single
          # source of truth): rewrite optionalDependencies to the published
          # version so an npm install never resolves a stale platform binary.
          node -e "const fs=require('fs'),p=require('./package.json');for(const k in (p.optionalDependencies||{}))p.optionalDependencies[k]=p.version;fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+String.fromCharCode(10))"
          npm publish --access public --provenance
