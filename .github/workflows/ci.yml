name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Go version is sourced from go.mod — the single source of truth.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Project-specific clean check
        if: runner.os == 'Linux'
        run: |
          if [ -f scripts/check-clean.sh ]; then
            if ! command -v rg >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y ripgrep
            fi
            bash scripts/check-clean.sh
          else
            echo "No scripts/check-clean.sh; skipping project-specific clean check."
          fi

      - name: golangci-lint
        # Action v8 pairs with golangci-lint v2 (the .golangci.yml `version: "2"`
        # config format); action v6 only drives v1 binaries.
        uses: golangci/golangci-lint-action@v8
        with:
          # 'latest' tracks the newest v2 linter release; pin to a specific
          # version (e.g. v2.1.0) once you want reproducible lint results.
          version: latest

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Ensure race detector toolchain
        if: runner.os == 'Linux'
        run: |
          if ! command -v gcc >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y build-essential
          fi

      - name: Run race tests
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

      - name: Upload coverage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install package metadata
        run: npm ci --ignore-scripts

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: [lint, test, npm-audit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and smoke test
        # explicit -o never appends .exe, so name the output per-OS;
        # bash keeps one step working across all three runners
        shell: bash
        run: |
          BIN=wechat-mp-cli
          [ "$RUNNER_OS" = "Windows" ] && BIN=wechat-mp-cli.exe
          go build -o "$BIN" ./cmd/wechat-mp-cli
          "./$BIN" --help
